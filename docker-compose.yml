# ---------------------------------------------------------------------------
# RAG Pipeline – docker-compose
#
# Services:
#   ollama       – local LLM server (skip if USE_HOST_OLLAMA=true)
#   ollama-pull  – pulls the default model once Ollama is healthy
#   rag          – the Python RAG application
#
# Volumes:
#   ollama_data  – Ollama model weights (persisted across restarts)
#   chroma_data  – ChromaDB vector database
#
# Usage (standard – Ollama inside Docker):
#   cp .env.example .env
#   docker compose up -d ollama
#   docker compose run --rm rag python main.py index /app/docs
#   docker compose run --rm rag python main.py query --version v3 \
#       --question "What is task decomposition?"
#
# Usage (host Ollama already running):
#   docker compose --profile host-ollama run --rm rag-host \
#       python -m pytest tests/ -v
# ---------------------------------------------------------------------------

services:

  # ── Ollama (LLM sidecar) ─────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: rag_ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Pull the default model after Ollama is healthy ───────────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "ollama pull ${LLM_MODEL:-mistral}"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    restart: "no"

  # ── RAG application (uses containerized Ollama) ──────────────────────────
  rag:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - chroma_data:/app/chroma_db
      - ${DOCS_DIR:-./docs}:/app/docs:ro
    entrypoint: ["tail", "-f", "/dev/null"]

  # ── RAG application (uses Ollama already running on the host) ────────────
  # Use this profile when you don't want Docker to manage Ollama.
  # Works on Windows/Mac automatically; on Linux requires Docker 20.10+.
  rag-host:
    profiles: ["host-ollama"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag_app_host
    env_file:
      - .env
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - chroma_data:/app/chroma_db
      - ${DOCS_DIR:-./docs}:/app/docs:ro

volumes:
  ollama_data:
  chroma_data: